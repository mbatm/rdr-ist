<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arama Radar · SEO Fırsatları</title>
<style>
  :root {
    --bg:#0f1115; --kart:#181b22; --kart2:#1f232c; --kenar:#2a2f3a;
    --metin:#e6e8ec; --soluk:#9aa3b2; --vurgu:#4f9dff;
    --acil:#f85149; --firsat:#3fb950; --izle:#d29922;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--metin);
    font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    padding:16px;max-width:960px;margin:0 auto;}
  h1{font-size:20px;margin:8px 0 2px;}
  .alt{color:var(--soluk);font-size:13px;margin-bottom:16px;}
  .araclar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
  button{background:var(--kart2);border:1px solid var(--kenar);border-radius:8px;
    color:var(--metin);padding:8px 14px;font-size:13px;cursor:pointer;font-family:inherit;}
  button.ana{background:var(--vurgu);border-color:var(--vurgu);color:#fff;font-weight:600;}
  a.link{color:var(--soluk);font-size:13px;text-decoration:none;border:1px solid var(--kenar);padding:8px 14px;border-radius:8px;}
  .anasekme{display:flex;gap:6px;margin-bottom:16px;border-bottom:1px solid var(--kenar);}
  .as-btn{background:transparent;border:none;color:var(--soluk);padding:9px 16px;font-size:13px;cursor:pointer;
    border-bottom:2px solid transparent;font-weight:500;font-family:inherit;}
  .as-btn.as-aktif{color:var(--metin);border-bottom-color:var(--vurgu);}
  .kw-kart{background:var(--kart);border:1px solid var(--kenar);border-radius:10px;padding:14px;margin-bottom:12px;}
  .kw-ust{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px;}
  .kw-ad{font-size:14px;font-weight:600;}
  .kw-poz{font-size:12px;padding:3px 10px;border-radius:20px;font-weight:700;}
  .poz-yok{background:#3a1518;color:#ff7b72;}
  .poz-kotu{background:#332813;color:#e3b341;}
  .poz-iyi{background:#12331c;color:#56d364;}
  .rakip-liste{display:flex;flex-direction:column;gap:4px;}
  .rakip{display:flex;gap:8px;font-size:12px;color:var(--soluk);align-items:center;}
  .rakip .p{width:20px;color:var(--metin);font-weight:600;}
  .rakip .d{color:var(--vurgu);}
  .firsat-kart{display:flex;gap:12px;background:var(--kart);border:1px solid var(--kenar);
    border-left:3px solid var(--kenar);border-radius:10px;padding:12px 14px;margin-bottom:10px;}
  .firsat-kart.acil{border-left-color:var(--acil);} .firsat-kart.firsat{border-left-color:var(--firsat);} .firsat-kart.izle{border-left-color:var(--izle);}
  .rozet{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700;text-transform:uppercase;}
  .r-acil{background:#3a1518;color:#ff7b72;} .r-firsat{background:#12331c;color:#56d364;} .r-izle{background:#332813;color:#e3b341;}
  .durum-yok{text-align:center;color:var(--soluk);padding:40px;}
  .son{color:var(--soluk);font-size:13px;margin-bottom:12px;}
</style>
</head>
<body>
  <h1>🔍 Arama Radar · SEO Fırsatları</h1>
  <div class="alt">kayserim.net Google konumu + rakip analizi + cevaplanmamış sorular (People Also Ask)</div>

  <div class="araclar">
    <a class="link" href="/">← rdr.ist</a>
    <button class="ana" onclick="tara()">⟳ Şimdi Tara</button>
    <button onclick="yukleHepsi()">Yenile</button>
    <a class="link" href="/arama-kelimeler.html">⚙ Kelimeler</a>
  </div>

  <div class="anasekme">
    <button class="as-btn as-aktif" data-as="rakip" onclick="anaSekmeDegis(this)">📊 Rakip Analizi</button>
    <button class="as-btn" data-as="firsat" onclick="anaSekmeDegis(this)">💡 İçerik Fırsatları</button>
    <button class="as-btn" data-as="seo" onclick="anaSekmeDegis(this)">📈 SEO (Ahrefs)</button>
  </div>

  <div id="son" class="son"></div>

  <div id="rakipPaneli">
    <div id="rakipListe"><div class="durum-yok">Yükleniyor…</div></div>
  </div>

  <div id="firsatPaneli" style="display:none">
    <div id="firsatListe"><div class="durum-yok">Yükleniyor…</div></div>
  </div>

  <div id="seoPaneli" style="display:none">
    <div id="seoListe"><div class="durum-yok">Yükleniyor…</div></div>
  </div>

<script>
const API = "/api/arama-radar";
const $ = id => document.getElementById(id);
function esc(s){return String(s||"").replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function zamanGec(iso){
  if(!iso) return "";
  const d=(Date.now()-Date.parse(iso))/60000;
  if(d<60) return Math.round(d)+" dk önce";
  if(d<1440) return Math.round(d/60)+" sa önce";
  return Math.round(d/1440)+" gün önce";
}

function anaSekmeDegis(el){
  document.querySelectorAll('.as-btn').forEach(b=>b.classList.remove('as-aktif'));
  el.classList.add('as-aktif');
  const hedef = el.dataset.as;
  $('rakipPaneli').style.display = hedef==='rakip' ? '' : 'none';
  $('firsatPaneli').style.display = hedef==='firsat' ? '' : 'none';
  $('seoPaneli').style.display = hedef==='seo' ? '' : 'none';
  if(hedef==='seo' && !window._seoYuklendi){ seoYukle(); }
}

async function yukleHepsi(){
  await Promise.all([rakipYukle(), firsatYukle()]);
}

async function rakipYukle(){
  $('rakipListe').innerHTML = '<div class="durum-yok">Yükleniyor…</div>';
  try{
    const r = await fetch(API+"?action=sonuclar&t="+Date.now(),{cache:"no-store"});
    const j = await r.json();
    if(j.son_tarama){
      $('son').textContent = "Son tarama: "+zamanGec(j.son_tarama.zaman)+" · "+
        (j.son_tarama.taranan_kelime??0)+" kelime · "+(j.son_tarama.pozisyon_yok??0)+" kelimede kayserim.net yok";
    }
    if(!j.sonuclar || !j.sonuclar.length){ $('rakipListe').innerHTML='<div class="durum-yok">Henüz tarama yapılmadı. "Şimdi Tara" ile başlat.</div>'; return; }
    $('rakipListe').innerHTML = j.sonuclar.map(s=>{
      const pozSinif = s.pozisyon===null?'poz-yok':s.pozisyon>5?'poz-kotu':'poz-iyi';
      const pozMetin = s.pozisyon===null?'İlk 10\'da yok':'#'+s.pozisyon;
      return `<div class="kw-kart">
        <div class="kw-ust">
          <span class="kw-ad">${esc(s.keyword)}</span>
          <span class="kw-poz ${pozSinif}">kayserim.net: ${pozMetin}</span>
        </div>
        <div class="rakip-liste">
          ${(s.rakipler||[]).slice(0,5).map(r=>`<div class="rakip"><span class="p">#${r.pozisyon}</span><span class="d">${esc(r.domain)}</span><span>${esc((r.baslik||'').slice(0,60))}</span></div>`).join('')}
        </div>
      </div>`;
    }).join('');
  }catch(e){ $('rakipListe').innerHTML='<div class="durum-yok">Hata: '+esc(e.message)+'</div>'; }
}

async function firsatYukle(){
  $('firsatListe').innerHTML = '<div class="durum-yok">Yükleniyor…</div>';
  try{
    const r = await fetch(API+"?action=firsatlar&t="+Date.now(),{cache:"no-store"});
    const j = await r.json();
    const liste = (j.firsatlar||[]).filter(f=>!f.gizli);
    if(!liste.length){ $('firsatListe').innerHTML='<div class="durum-yok">İçerik fırsatı yok.</div>'; return; }
    $('firsatListe').innerHTML = liste.map(f=>`
      <div class="firsat-kart ${f.durum}">
        <div style="flex:1">
          <div style="display:flex;gap:8px;align-items:center;margin-bottom:4px">
            <span class="rozet r-${f.durum}">${f.durum}</span>
            <span style="font-size:11px;color:var(--soluk)">"${esc(f.anahtar_kelime)}" araması</span>
          </div>
          <div style="font-size:14px;margin-bottom:4px">${esc(f.baslik)}</div>
          <div style="font-size:11px;color:var(--soluk);margin-bottom:8px">${esc(f.tam_metin)}</div>
          <button onclick="haberlestir('${esc(f.id)}')" style="background:var(--vurgu);color:#fff;border-color:var(--vurgu);font-weight:600;font-size:11px;padding:4px 10px">📰 Haberleştir</button>
          <button onclick="isaretle('${esc(f.id)}','gizli')" style="font-size:11px;padding:4px 10px">✕ Gizle</button>
        </div>
      </div>`).join('');
  }catch(e){ $('firsatListe').innerHTML='<div class="durum-yok">Hata: '+esc(e.message)+'</div>'; }
}

let firsatVeri = [];
async function haberlestir(id){
  const r = await fetch(API+"?action=firsatlar&t="+Date.now(),{cache:"no-store"});
  const j = await r.json();
  const f = (j.firsatlar||[]).find(x=>x.id===id);
  if(!f) return;
  const prefill = {
    baslik: f.baslik,
    metin: `"${f.anahtar_kelime}" araması yapan okuyucuların sorduğu bir soru: ${f.baslik}\n\nBu soruyu Kayseri bağlamında yanıtlayan bir haber/rehber içeriği hazırlanabilir.`,
    kategori: 'Güncel',
  };
  try { window.parent.postMessage({ type: 'rdrist:haberlestir', prefill }, '*'); } catch(e) {}
  isaretle(id, 'yazildi');
}

async function isaretle(id, alan){
  try{
    await fetch(API+"?action=isaretle",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({id,alan,deger:true})});
    firsatYukle();
  }catch(e){}
}

async function tara(){
  $('son').textContent = "Taranıyor… (Apify SERP taraması ~30-60sn sürebilir)";
  try{
    const r = await fetch(API+"?action=tara&t="+Date.now(),{cache:"no-store"});
    const j = await r.json();
    if(j.baslatildi){ $('son').textContent = "Tarama başlatıldı · ~1 dk sonra 'Yenile' ile sonucu topla"; }
    else if(j.log){ $('son').textContent = "Tarama tamamlandı · "+j.log.yeni_firsat+" yeni fırsat"; yukleHepsi(); }
    else { $('son').textContent = JSON.stringify(j); }
  }catch(e){ $('son').textContent = "Hata: "+e.message; }
}

// ── SEO (Ahrefs) sekmesi ─────────────────────────────────────────────
function sayi(n){ return Number(n||0).toLocaleString('tr-TR'); }
function kisaUrl(u){ try{ const p=new URL(u); return p.pathname.length>1?p.pathname.slice(0,55):p.hostname; }catch(e){ return String(u).slice(0,55); } }
function gLink(kw){ return 'https://www.google.com/search?q='+encodeURIComponent(kw); }
function pozRozet(p){
  const r = p<=3 ? '#00D4AA' : p<=10 ? '#FFB700' : p<=20 ? '#ff9f43' : '#888';
  return '<span style="display:inline-block;min-width:34px;text-align:center;font-weight:700;color:#0a0a0f;background:'+r+';border-radius:4px;padding:1px 6px">#'+p+'</span>';
}
function kwSatir(k){
  return '<tr>'+
    '<td><a class="link" target="_blank" href="'+gLink(k.keyword)+'">'+esc(k.keyword)+'</a></td>'+
    '<td>'+pozRozet(k.best_position)+'</td>'+
    '<td style="text-align:right">'+sayi(k.volume)+'</td>'+
    '<td style="text-align:right">'+sayi(k.sum_traffic)+'</td>'+
    '<td><a class="link" target="_blank" href="'+esc(k.best_position_url||'#')+'">'+esc(kisaUrl(k.best_position_url||''))+'</a></td>'+
    '<td><button class="fikir-btn" data-kw="'+esc(k.keyword)+'" data-poz="'+k.best_position+'" data-url="'+esc(k.best_position_url||'')+'" onclick="fikirUret(this)" title="Claude ile içerik fikri üret" style="padding:2px 8px;font-size:12px">✍ Üret</button></td>'+
  '</tr>';
}
function kwTablo(baslik, aciklama, liste){
  if(!liste.length) return '';
  return '<div class="kw-kart" style="margin-bottom:14px">'+
    '<div style="font-weight:700;margin-bottom:2px">'+baslik+' <span style="color:#888;font-weight:400;font-size:12px">('+liste.length+')</span></div>'+
    '<div style="color:#888;font-size:12px;margin-bottom:8px">'+aciklama+'</div>'+
    '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:13px">'+
    '<tr style="color:#888;font-size:11px;text-align:left"><th style="padding:4px">Kelime</th><th>Poz</th><th style="text-align:right">Aylık Hacim</th><th style="text-align:right">Trafik</th><th>Sayfa</th><th></th></tr>'+
    liste.map(kwSatir).join('')+
    '</table></div></div>';
}
async function seoYukle(){
  window._seoYuklendi = true;
  $('seoListe').innerHTML = '<div class="durum-yok">Yükleniyor…</div>';
  try{
    const r = await fetch(API+"?action=seo&t="+Date.now(),{cache:"no-store"});
    const j = await r.json();
    const seo = j.seo;
    if(!seo){ $('seoListe').innerHTML='<div class="durum-yok">Henüz SEO verisi yüklenmemiş. "⟳ Ahrefs\'ten Güncelle" butonunu kullan veya Claude oturumundan yükle.</div>'; return; }
    const K = seo.kelimeler||[];
    const vurulabilir = K.filter(k=>k.best_position>=4 && k.best_position<=15).sort((a,b)=>b.volume-a.volume);
    const ikinciSayfa = K.filter(k=>k.best_position>=16 && k.best_position<=30 && k.volume>=3000).sort((a,b)=>b.volume-a.volume);
    const guclu = K.filter(k=>k.best_position<=3).sort((a,b)=>b.volume-a.volume);
    const toplamTrafik = (seo.sayfalar||[]).reduce((t,s)=>t+(s.sum_traffic||0),0);

    let html = '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px">'+
      '<span style="color:#888;font-size:12px">Veri: '+esc(seo.tarih||'')+' · Güncelleme: '+zamanGec(seo.guncelleme)+' · Kaynak: '+esc(seo.kaynak||'')+'</span>'+
      '<button onclick="seoGuncelle()" style="margin-left:auto">⟳ Ahrefs\'ten Güncelle</button></div>';

    html += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin-bottom:16px">'+
      [['İzlenen Kelime',K.length],['Top-3 Kelime',guclu.length],['Vurulabilir (4-15)',vurulabilir.length],['Top 20 Sayfa Trafiği',sayi(toplamTrafik)+'/ay']]
      .map(c=>'<div class="kw-kart" style="text-align:center"><div style="font-size:20px;font-weight:700;color:#4dabf7">'+c[1]+'</div><div style="font-size:11px;color:#888">'+c[0]+'</div></div>').join('')+'</div>';

    html += kwTablo('🎯 Vurulabilir Kelimeler (pozisyon 4-15)',
      'Küçük dokunuşla ilk 3\'e taşınabilir: içeriği güncelle, başlığı optimize et, iç link ver. En yüksek hacimliler üstte.', vurulabilir);
    html += kwTablo('🌊 İkinci Sayfa Hazineleri (16-30, hacim ≥3K)',
      'Bu kelimeler için içerik zaten var ama 2-3. sayfada. Derinleştirilmiş güncelleme + yeni başlık = ilk sayfa şansı.', ikinciSayfa);
    html += kwTablo('🏆 Korunacak Güçlü Pozisyonlar (1-3)',
      'Trafik getiren mevkiler — bu sayfaların tazeliğini koru, rakip yaklaşırsa öncelik ver.', guclu);

    if((seo.sayfalar||[]).length){
      html += '<div class="kw-kart" style="margin-bottom:14px"><div style="font-weight:700;margin-bottom:8px">📄 En Çok Trafik Getiren Sayfalar</div>'+
        '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:13px">'+
        '<tr style="color:#888;font-size:11px;text-align:left"><th style="padding:4px">Sayfa</th><th style="text-align:right">Trafik/ay</th><th style="text-align:right">Kelime</th><th>Top Kelime</th></tr>'+
        seo.sayfalar.map(s=>'<tr><td><a class="link" target="_blank" href="'+esc(s.url)+'">'+esc(kisaUrl(s.url))+'</a></td>'+
          '<td style="text-align:right;font-weight:600">'+sayi(s.sum_traffic)+'</td><td style="text-align:right">'+sayi(s.keywords)+'</td>'+
          '<td>'+esc(s.top_keyword||'')+' '+(s.top_keyword_best_position?pozRozet(s.top_keyword_best_position):'')+'</td></tr>').join('')+
        '</table></div></div>';
    }
    if((seo.rakipler||[]).length){
      html += '<div class="kw-kart"><div style="font-weight:700;margin-bottom:8px">🥊 Organik Rakipler (ortak kelime bazlı)</div>'+
        '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:13px">'+
        '<tr style="color:#888;font-size:11px;text-align:left"><th style="padding:4px">Domain</th><th style="text-align:right">DR</th><th style="text-align:right">Ortak Kelime</th><th style="text-align:right">Pay %</th></tr>'+
        seo.rakipler.sort((a,b)=>b.keywords_common-a.keywords_common).map(rk=>'<tr><td>'+esc(rk.competitor_domain)+'</td>'+
          '<td style="text-align:right">'+(rk.domain_rating??'—')+'</td><td style="text-align:right">'+sayi(rk.keywords_common)+'</td>'+
          '<td style="text-align:right">'+(rk.share??'—')+'</td></tr>').join('')+
        '</table></div></div>';
    }
    $('seoListe').innerHTML = html;
  }catch(e){ $('seoListe').innerHTML='<div class="durum-yok">Hata: '+esc(e.message)+'</div>'; }
}
async function fikirUret(btn){
  const kw = btn.dataset.kw, poz = btn.dataset.poz, sayfa = btn.dataset.url;
  btn.disabled = true; btn.textContent = '…';
  const tr = btn.closest('tr');
  let fikirTr = tr.nextElementSibling;
  if(!fikirTr || !fikirTr.classList.contains('fikir-satir')){
    fikirTr = document.createElement('tr'); fikirTr.className = 'fikir-satir';
    fikirTr.innerHTML = '<td colspan="6" style="background:rgba(77,171,247,.05);border-radius:6px;padding:10px;font-size:12.5px;color:#ccc">Üretiliyor…</td>';
    tr.after(fikirTr);
  }
  const hucre = fikirTr.firstElementChild;
  hucre.textContent = 'Claude içerik fikri üretiyor…';
  try{
    const sistem = 'Sen kayserim.net (Kayseri yerel haber sitesi) için çalışan kıdemli SEO editörüsün. Görev: verilen arama kelimesi için siteyi ilk 3 pozisyona taşıyacak içerik stratejisi üret. Bilgi uydurma; doğrulanması gereken noktaları [DOĞRULA] ile işaretle. Sadece JSON döndür.';
    const soru = 'Kelime: "'+kw+'" · Mevcut pozisyon: #'+poz+' · Mevcut sayfa: '+sayfa+'\n\nŞu JSON\'u üret:\n{"strateji":"guncelle|yeni_sayfa|rehber","neden":"1 cümle","basliklar":["3 SEO başlık önerisi"],"aci":"içeriğin Kayseri-yerel açısı ve kapsaması gereken alt konular (2-3 cümle)","ilk_adim":"ekibin bugün atabileceği somut ilk adım"}';
    const r = await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:800,system:sistem,messages:[{role:'user',content:soru}]})});
    const d = await r.json();
    const text = (d.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n');
    const m = text.match(/\{[\s\S]*\}/);
    if(!m) throw new Error('JSON alınamadı');
    const j = JSON.parse(m[0]);
    const stratEt = {guncelle:'♻ Mevcut sayfayı güncelle', yeni_sayfa:'✚ Yeni sayfa aç', rehber:'📗 Kalıcı rehber sayfası kur'}[j.strateji] || j.strateji;
    hucre.innerHTML =
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><b style="color:#4dabf7">'+esc(stratEt)+'</b><span style="color:#888">'+esc(j.neden||'')+'</span>'+
      '<button onclick="this.closest(\'tr\').remove()" style="margin-left:auto;padding:1px 8px;font-size:11px">✕</button></div>'+
      '<div style="margin-bottom:6px"><b>Başlık önerileri:</b><ul style="margin:4px 0 0 18px;padding:0">'+(j.basliklar||[]).map(b=>'<li>'+esc(b)+'</li>').join('')+'</ul></div>'+
      '<div style="margin-bottom:6px"><b>Açı:</b> '+esc(j.aci||'')+'</div>'+
      '<div><b>İlk adım:</b> '+esc(j.ilk_adim||'')+'</div>';
  }catch(e){ hucre.textContent = 'Hata: '+e.message; }
  btn.disabled = false; btn.textContent = '✍ Üret';
}
async function seoGuncelle(){
  $('seoListe').innerHTML = '<div class="durum-yok">Ahrefs\'ten çekiliyor…</div>';
  try{
    const r = await fetch(API+"?action=seo-guncelle&t="+Date.now(),{cache:"no-store"});
    const j = await r.json();
    if(j.hata){ alert(j.hata); }
    else if(j.atlandi){ alert(j.sebep); }
    seoYukle();
  }catch(e){ alert('Hata: '+e.message); seoYukle(); }
}

yukleHepsi();
setInterval(yukleHepsi, 180000);
</script>
</body>
</html>
