<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sosyal Radar · Kaynak Yönetimi</title>
<style>
  :root {
    --bg: #0f1115; --kart: #181b22; --kart2: #1f232c; --kenar: #2a2f3a;
    --metin: #e6e8ec; --soluk: #9aa3b2; --vurgu: #4f9dff; --vurgu2: #2563eb;
    --yesil: #3fb950; --kirmizi: #f85149; --sari: #d29922;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--metin);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: 16px; max-width: 880px; margin: 0 auto;
  }
  h1 { font-size: 20px; margin: 8px 0 4px; }
  .alt { color: var(--soluk); font-size: 13px; margin-bottom: 20px; }
  .kart { background: var(--kart); border: 1px solid var(--kenar); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
  label { display: block; font-size: 13px; color: var(--soluk); margin: 10px 0 4px; }
  input, select, textarea {
    width: 100%; background: var(--kart2); border: 1px solid var(--kenar);
    border-radius: 8px; color: var(--metin); padding: 10px 12px; font-size: 14px; font-family: inherit;
  }
  textarea { resize: vertical; min-height: 70px; }
  .satir { display: flex; gap: 10px; flex-wrap: wrap; }
  .satir > div { flex: 1; min-width: 120px; }
  button {
    background: var(--vurgu2); color: #fff; border: none; border-radius: 8px;
    padding: 10px 18px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 14px;
  }
  button:hover { background: var(--vurgu); }
  button.ikincil { background: transparent; border: 1px solid var(--kenar); color: var(--soluk); }
  button.mini { padding: 5px 10px; font-size: 12px; margin: 0; }
  button.sil { background: transparent; border: 1px solid var(--kenar); color: var(--kirmizi); }
  .liste { margin-top: 4px; }
  .kaynak {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    border: 1px solid var(--kenar); border-radius: 8px; margin-bottom: 8px; background: var(--kart2);
  }
  .kaynak.pasif { opacity: .5; }
  .rozet { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 600; white-space: nowrap; }
  .ig { background: #3b1d3a; color: #e879c7; }
  .tw { background: #14304a; color: #5bb0ff; }
  .yt { background: #3a1a1a; color: #ff6b6b; }
  .fb { background: #16284d; color: #6aa0ff; }
  .rss { background: #3a2e14; color: #e0b341; }
  .web { background: #25303a; color: #8fb3c9; }
  .kaynak .ad { flex: 1; font-weight: 500; }
  .kaynak .handle { color: var(--soluk); font-size: 12px; font-weight: 400; }
  .durum { font-size: 13px; padding: 10px 0; min-height: 20px; }
  .durum.ok { color: var(--yesil); }
  .durum.err { color: var(--kirmizi); }
  .ust { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
  .sayac { font-size: 13px; color: var(--soluk); }
  .ayrac { height: 1px; background: var(--kenar); margin: 14px 0; }
  details summary { cursor: pointer; color: var(--soluk); font-size: 13px; }
</style>
</head>
<body>
  <h1>📡 Sosyal Radar · Kaynak Yönetimi</h1>
  <div class="alt">Takip edilecek hesapları ekle/çıkar. Instagram, Twitter/X, YouTube, Facebook veya RSS feed.</div>
  <div style="margin-bottom:16px;display:flex;gap:8px">
    <a href="/" style="color:#9aa3b2;font-size:13px;text-decoration:none;border:1px solid #2a2f3a;padding:7px 13px;border-radius:8px">← rdr.ist</a>
    <a href="/sosyal-radar.html" style="color:#9aa3b2;font-size:13px;text-decoration:none;border:1px solid #2a2f3a;padding:7px 13px;border-radius:8px">📡 Haber Adayları</a>
  </div>

  <div class="kart">
    <label>API adresi (rdr.ist endpoint)</label>
    <input id="api" placeholder="https://rdr.ist/api/sosyal-radar" value="/api/sosyal-radar">
    <details style="margin-top:8px">
      <summary>Yetki gerekiyorsa secret gir (opsiyonel)</summary>
      <label>Secret</label>
      <input id="secret" placeholder="(rdr.ist'ten açıldıysa gerekmez)">
    </details>
  </div>

  <div class="kart">
    <div class="ust">
      <strong>➕ Yeni Kaynak Ekle</strong>
    </div>
    <label>Hesap URL'i, @kullanıcıadı veya RSS feed adresi</label>
    <input id="girdi" placeholder="https://www.instagram.com/kayseribsb/  ·  @kayseribsb  ·  https://rss.app/feeds/....xml">
    <div class="satir">
      <div>
        <label>Etiket (görünen ad)</label>
        <input id="etiket" placeholder="Kayseri Büyükşehir">
      </div>
      <div>
        <label>Öncelik</label>
        <select id="oncelik">
          <option value="1">1 — Yüksek</option>
          <option value="2" selected>2 — Normal</option>
          <option value="3">3 — Düşük</option>
        </select>
      </div>
    </div>
    <button onclick="ekle()">Ekle</button>
    <button class="ikincil" onclick="topluAc()">Toplu ekle (çok satır)</button>
    <div id="topluAlan" style="display:none">
      <label>Her satıra bir URL/handle yapıştır</label>
      <textarea id="toplu" placeholder="https://www.instagram.com/melikgazibel/&#10;https://www.instagram.com/talasbelediyesi/&#10;@develibld"></textarea>
      <button onclick="topluEkle()">Hepsini Ekle</button>
    </div>
    <div id="durumEkle" class="durum"></div>
  </div>

  <div class="kart">
    <div class="ust">
      <strong>📋 Mevcut Kaynaklar</strong>
      <span class="sayac" id="sayac">—</span>
    </div>
    <div class="ayrac"></div>
    <div id="liste" class="liste"><div class="durum">Yükleniyor…</div></div>
    <button class="ikincil" onclick="yukle()">↻ Yenile</button>
  </div>

<script>
const $ = id => document.getElementById(id);
const apiUrl = () => $('api').value.trim().replace(/\/$/, '');
const secretQ = () => { const s = $('secret').value.trim(); return s ? ('?secret=' + encodeURIComponent(s)) : ''; };

function rozetSinif(p){ return ({instagram:'ig',twitter:'tw',youtube:'yt',facebook:'fb',rss:'rss',web:'web'})[p] || 'web'; }
function rozetAd(p){ return ({instagram:'IG',twitter:'X',youtube:'YT',facebook:'FB',rss:'RSS',web:'WEB'})[p] || p.toUpperCase(); }

async function yukle(){
  const l = $('liste');
  l.innerHTML = '<div class="durum">Yükleniyor…</div>';
  try {
    const r = await fetch(apiUrl() + '?action=kaynaklar');
    const j = await r.json();
    if (!j.ok) throw new Error(j.hata || 'Hata');
    $('sayac').textContent = j.ozet.toplam + ' kaynak · ' + j.ozet.aktif + ' aktif';
    if (!j.kaynaklar.length){ l.innerHTML = '<div class="durum">Henüz kaynak yok.</div>'; return; }
    l.innerHTML = j.kaynaklar.map(k => `
      <div class="kaynak ${k.aktif===false?'pasif':''}">
        <span class="rozet ${rozetSinif(k.platform)}">${rozetAd(k.platform)}</span>
        <span class="ad">${esc(k.etiket||k.handle)}<br><span class="handle">${esc(k.handle)}</span></span>
        <button class="mini ikincil" onclick="acKapat('${k.platform}','${esc(k.handle)}',${k.aktif===false})">${k.aktif===false?'Aç':'Durdur'}</button>
        <button class="mini sil" onclick="sil('${k.platform}','${esc(k.handle)}')">Sil</button>
      </div>`).join('');
  } catch(e){
    l.innerHTML = '<div class="durum err">Bağlantı hatası: ' + esc(e.message) + '</div>';
  }
}

async function ekle(){
  const girdi = $('girdi').value.trim();
  if (!girdi){ durum('Bir URL veya handle gir', false); return; }
  const body = { girdi, etiket: $('etiket').value.trim() || undefined, oncelik: Number($('oncelik').value) };
  await gonder('kaynak-ekle', body, 'Eklendi: ');
  $('girdi').value=''; $('etiket').value='';
}

async function topluEkle(){
  const satirlar = $('toplu').value.split('\n').map(s=>s.trim()).filter(Boolean);
  if (!satirlar.length){ durum('Boş', false); return; }
  await gonder('kaynak-topla-ekle', { girdiler: satirlar }, '');
  $('toplu').value='';
}

async function sil(platform, handle){
  if (!confirm(handle + ' silinsin mi?')) return;
  await gonder('kaynak-sil', { platform, handle }, 'Silindi: ');
}

async function acKapat(platform, handle, suanPasif){
  await gonder('kaynak-guncelle', { platform, handle, aktif: suanPasif }, '');
}

async function gonder(action, body, onek){
  try {
    const r = await fetch(apiUrl() + '?action=' + action + (secretQ()? '&'+secretQ().slice(1):''), {
      method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)
    });
    const j = await r.json();
    if (!j.ok) throw new Error(j.hata || ('HTTP '+r.status));
    if (action==='kaynak-topla-ekle') durum(j.eklenen_sayisi + ' kaynak eklendi (toplam '+j.toplam+')', true);
    else durum(onek + (j.eklendi? (j.eklendi.etiket||j.eklendi.handle) : (j.silindi? j.silindi.handle : 'tamam')), true);
    yukle();
  } catch(e){ durum('Hata: ' + e.message, false); }
}

function durum(mesaj, ok){ const d=$('durumEkle'); d.textContent=mesaj; d.className='durum '+(ok?'ok':'err'); }
function topluAc(){ const t=$('topluAlan'); t.style.display = t.style.display==='none'?'block':'none'; }
function esc(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

yukle();
</script>
</body>
</html>
