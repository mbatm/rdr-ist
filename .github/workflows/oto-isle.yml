name: Otomatik Haber İşleme

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  haber-isle:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: 1ha Haberleri İşle
        run: |
          SONUC=$(curl -s "https://rdr.ist/api/oto-isle?adet=10&secret=${{ secrets.RSS_API_KEY }}")
          echo "Sonuç: $SONUC"
          echo "$SONUC" | grep -q '"hata"' && echo "HATA VAR" && exit 1 || echo "BAŞARILI"

      - name: Radar Facebook Sync
        continue-on-error: true
        run: |
          SONUC=$(curl -s "https://rdr.ist/api/radar-fb-sync?secret=${{ secrets.RSS_API_KEY }}")
          echo "Radar FB: $SONUC"
