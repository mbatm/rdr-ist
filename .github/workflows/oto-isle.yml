name: rdr.ist Otomasyon

on:
  schedule:
    - cron: '*/5 * * * *'   # Her 5 dakika — haber işleme + radar FB
    - cron: '0 3 * * 1,3,5' # Pzt/Çar/Cum 03:00 UTC — Ahrefs sync
    - cron: '0 0 * * *'     # Her gece 00:00 UTC — video düzelt + temizlik
  workflow_dispatch:

jobs:

  haber-isle:
    name: Haber İşle (5dk)
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: 1ha Haberleri İşle
        run: |
          SONUC=$(curl -s "https://rdr.ist/api/oto-isle?adet=10&secret=${{ secrets.RSS_API_KEY }}")
          echo "Sonuç: $SONUC"
          echo "$SONUC" | grep -q '"hata"' && echo "HATA VAR" && exit 1 || echo "BAŞARILI"

      - name: Radar Facebook Sync
        continue-on-error: true
        run: |
          SONUC=$(curl -s "https://rdr.ist/api/radar-fb-sync?secret=${{ secrets.RSS_API_KEY }}")
          echo "Radar FB: $SONUC"

  ahrefs-sync:
    name: Ahrefs Keyword Sync (Pzt/Çar/Cum)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    if: github.event.schedule == '0 3 * * 1,3,5' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Ahrefs Keyword Güncelle
        run: |
          SONUC=$(curl -s "https://rdr.ist/api/ahrefs-sync?secret=${{ secrets.RSS_API_KEY }}")
          echo "Ahrefs: $SONUC"

  gece-isler:
    name: Gece İşlemleri (00:00)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event.schedule == '0 0 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Video Düzelt
        continue-on-error: true
        run: |
          SONUC=$(curl -s "https://rdr.ist/api/video-duzelt?secret=${{ secrets.RSS_API_KEY }}")
          echo "Video düzelt: $SONUC"

      - name: Creatomate Temizlik
        continue-on-error: true
        run: |
          SONUC=$(curl -s "https://rdr.ist/api/temizle?secret=${{ secrets.RSS_API_KEY }}&gun=10")
          echo "Temizlik: $SONUC"
