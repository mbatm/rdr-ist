name: rdr.ist Otomasyon

on:
  schedule:
    - cron: '*/5 * * * *'   # Her 5 dakika — haber işleme + radar FB
    - cron: '0 3 * * 1,3,5' # Pzt/Çar/Cum 03:00 UTC — Ahrefs sync
    - cron: '0 0 * * *'     # Her gece 00:00 UTC — video düzelt + temizlik
  workflow_dispatch:

jobs:

  haber-isle:
    name: Haber İşle (5dk)
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: 1ha Haberleri İşle
        continue-on-error: true
        run: |
          SONUC=$(curl -sf --max-time 60 "https://rdr.ist/api/oto-isle?adet=10&secret=${{ secrets.RSS_API_KEY }}" 2>&1) || true
          echo "Sonuç: $SONUC"

      - name: Radar Facebook Sync
        continue-on-error: true
        run: |
          SONUC=$(curl -sf --max-time 60 "https://rdr.ist/api/radar-fb-sync?secret=${{ secrets.RSS_API_KEY }}" 2>&1) || true
          echo "Radar FB: $SONUC"

      - name: Bekleyen Video Container Publish
        continue-on-error: true
        run: |
          SONUC=$(curl -sf --max-time 60 "https://rdr.ist/api/video-duzelt?secret=${{ secrets.RSS_API_KEY }}" 2>&1) || true
          echo "Video container: $SONUC"

      - name: Kesfet Radar Tara
        continue-on-error: true
        run: |
          SONUC=$(curl -sf --max-time 60 "https://rdr.ist/api/kesfet-radar?action=scan&secret=${{ secrets.RSS_API_KEY }}" 2>&1) || true
          echo "Kesfet Radar: $SONUC"

      - name: Sosyal Radar Tara
        continue-on-error: true
        run: |
          SONUC=$(curl -sf --max-time 60 "https://rdr.ist/api/sosyal-radar?action=tara" 2>&1) || true
          echo "Sosyal Radar: $SONUC"

      - name: Etkinlik Radar Tara
        continue-on-error: true
        run: |
          SONUC=$(curl -sf --max-time 60 "https://rdr.ist/api/etkinlik-radar?action=tara" 2>&1) || true
          echo "Etkinlik Radar: $SONUC"

  ahrefs-sync:
    name: Ahrefs Keyword Sync (Pzt/Çar/Cum)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    if: github.event.schedule == '0 3 * * 1,3,5' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Ahrefs Keyword Güncelle
        continue-on-error: true
        run: |
          SONUC=$(curl -sf --max-time 60 "https://rdr.ist/api/ahrefs-sync?secret=${{ secrets.RSS_API_KEY }}" 2>&1) || true
          echo "Ahrefs: $SONUC"

  gece-isler:
    name: Gece İşlemleri (00:00)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event.schedule == '0 0 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Video Düzelt
        continue-on-error: true
        run: |
          SONUC=$(curl -sf --max-time 60 "https://rdr.ist/api/video-duzelt?secret=${{ secrets.RSS_API_KEY }}" 2>&1) || true
          echo "Video düzelt: $SONUC"

      - name: Creatomate Temizlik
        continue-on-error: true
        run: |
          SONUC=$(curl -sf --max-time 60 "https://rdr.ist/api/temizle?secret=${{ secrets.RSS_API_KEY }}&gun=10" 2>&1) || true
          echo "Temizlik: $SONUC"

  tani:
    name: Sistem Tanı (elle tetikleme)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Sağlık Kontrolleri
        run: |
          TW=$(curl -s --max-time 30 -H "X-API-Key: ${{ secrets.RSS_API_KEY }}" "https://rdr.ist/api/twitter-test") || TW='{"hata":"erisim"}'
          YT=$(curl -s --max-time 30 "https://rdr.ist/api/youtube-durum?secret=${{ secrets.RSS_API_KEY }}") || YT='{"hata":"erisim"}'
          AH=$(curl -s --max-time 60 "https://rdr.ist/api/ahrefs-sync?secret=${{ secrets.RSS_API_KEY }}") || AH='{"hata":"erisim"}'
          SEO=$(curl -s --max-time 30 "https://rdr.ist/api/arama-radar?action=seo" | head -c 200) || SEO='{"hata":"erisim"}'
          # Yeni auth zinciri testleri
          YTA=$(curl -s --max-time 30 -X POST -H "Content-Type: application/json" -H "X-API-Key: ${{ secrets.RSS_API_KEY }}" -d '{}' "https://rdr.ist/api/youtube-yukle") || YTA='{"hata":"erisim"}'
          SILRED=$(curl -s --max-time 30 -X POST -H "Content-Type: application/json" -H "X-API-Key: sahte" -d '{"platform":"facebook","post_id":"0"}' "https://rdr.ist/api/paylas-sil") || SILRED='{"hata":"erisim"}'
          SOSYAL=$(curl -s --max-time 30 "https://rdr.ist/api/sosyal-radar?action=durum" | head -c 300) || SOSYAL='{"hata":"erisim"}'
          printf '{"zaman":"%s","twitter_test_ozet":"%s","youtube_durum":%s,"ahrefs_sync_ozet":"%s","yetkili_youtube_testi":%s,"sahte_anahtar_sil_testi":%s,"sosyal_durum":"%s","arama_seo_ozet":"%s"}\n' \
            "$(date -u +%FT%TZ)" "$(echo $TW | tr -d '"' | head -c 120)" "$YT" "$(echo $AH | tr -d '"' | head -c 150)" "$YTA" "$SILRED" "$(echo $SOSYAL | tr -d '"' | head -c 250)" "$(echo $SEO | tr -d '"' | head -c 150)" > tani-sonuc.json
          cat tani-sonuc.json
      - name: Sonucu Kaydet
        run: |
          git config user.name "tani-bot"
          git config user.email "tani@rdr.ist"
          git add tani-sonuc.json
          git commit -m "chore(tani): sistem saglik raporu [skip ci]" || echo "değişiklik yok"
          git push
